name: Kontrola jakości

on:
  push:
    branches: [audyt]
  pull_request:
    branches: [audyt]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: vilda-calc-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit:
    name: Lint, składnia i testy jednostkowe
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Pobierz repozytorium
        uses: actions/checkout@v4
      - name: Skonfiguruj Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - name: Zainstaluj zależności
        run: npm ci
      - name: Uruchom kontrole bez przeglądarki
        run: npm test

  browser:
    name: Testy przeglądarkowe i PWA
    runs-on: ubuntu-latest
    needs: unit
    timeout-minutes: 20
    steps:
      - name: Pobierz repozytorium
        uses: actions/checkout@v4
      - name: Skonfiguruj Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - name: Zainstaluj zależności
        run: npm ci
      - name: Zainstaluj Chromium
        run: npx playwright install --with-deps chromium
      - name: Uruchom testy Playwright
        run: npm run test:e2e
      - name: Zachowaj raport po niepowodzeniu
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
