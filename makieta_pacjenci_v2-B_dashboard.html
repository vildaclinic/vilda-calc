<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Pacjenci — B · Dashboard zdrowia</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#1f2a2e; --muted:#6c7a7e; --faint:#9aa7ab;
    --teal:#0a9d8e; --teal2:#16b3a0; --coral:#e8743b; --amber:#cf8a2e; --danger:#d2483d;
    --card:#ffffff; --line:#ece7df;
  }
  *{box-sizing:border-box}
  html,body{height:100%}
  body{margin:0;font-family:'Inter',system-ui,-apple-system,sans-serif;color:var(--ink);
    display:flex;flex-direction:column;-webkit-text-size-adjust:100%;
    background:
      radial-gradient(1100px 500px at 100% -5%, #e7f5f0 0%, rgba(231,245,240,0) 60%),
      linear-gradient(180deg,#faf8f3 0%,#f5f2ec 100%);}
  .wrap{flex:1 1 auto;min-height:0;display:flex;flex-direction:column;max-width:1100px;width:100%;margin:0 auto;padding:0 20px;}

  .head{flex:0 0 auto;padding:24px 0 8px;}
  .hello{font-size:.86rem;font-weight:600;color:var(--teal);letter-spacing:.02em;}
  .head h1{margin:2px 0 0;font-size:1.9rem;font-weight:800;letter-spacing:-.02em;}
  .head .sub{font-size:.9rem;color:var(--muted);margin-top:3px;}

  .search{position:relative;margin:16px 0 14px;}
  .search input{width:100%;border:1px solid var(--line);background:var(--card);border-radius:16px;
    padding:14px 16px 14px 46px;font-family:inherit;font-size:1rem;color:var(--ink);outline:none;
    box-shadow:0 4px 16px rgba(60,55,40,.05);transition:.15s;}
  .search input:focus{border-color:var(--teal);box-shadow:0 0 0 3px rgba(10,157,142,.14);}
  .search .ic{position:absolute;left:16px;top:50%;transform:translateY(-50%);color:var(--faint);}

  .filters{display:flex;gap:8px;align-items:center;margin-bottom:6px;flex-wrap:wrap;}
  .chip{border:1px solid var(--line);background:var(--card);color:var(--muted);border-radius:999px;
    padding:8px 16px;font-family:inherit;font-size:.84rem;font-weight:600;cursor:pointer;transition:.15s;}
  .chip.on{background:var(--ink);color:#fff;border-color:var(--ink);}
  .sort{margin-left:auto;color:var(--muted);font-size:.82rem;font-weight:600;cursor:pointer;background:none;border:0;font-family:inherit;padding:8px;}

  .scroll{flex:1 1 auto;min-height:0;overflow:auto;padding:6px 4px 18px;}
  .scroll::-webkit-scrollbar{width:8px}.scroll::-webkit-scrollbar-thumb{background:#dcd6cc;border-radius:8px}

  .lab{font-size:.78rem;font-weight:700;color:var(--muted);letter-spacing:.04em;margin:14px 4px 10px;display:flex;align-items:center;gap:8px;}
  .lab .pill{font-size:.66rem;font-weight:700;color:var(--teal);background:#e3f4f0;border-radius:999px;padding:2px 8px;}

  /* HERO: poziome bogate karty „ostatnio" */
  .hero{display:flex;gap:13px;overflow-x:auto;padding:2px 2px 10px;scrollbar-width:none;}
  .hero::-webkit-scrollbar{display:none}
  .hcard{flex:0 0 auto;width:186px;background:var(--card);border-radius:22px;padding:16px;cursor:pointer;
    box-shadow:0 10px 26px rgba(60,55,40,.08);transition:transform .15s,box-shadow .15s;position:relative;overflow:hidden;}
  .hcard:hover{transform:translateY(-3px);box-shadow:0 16px 34px rgba(60,55,40,.14);}
  .hcard .cap{position:absolute;top:0;left:0;right:0;height:54px;opacity:.16;}
  .hcard .ava{width:52px;height:52px;border-radius:16px;font-size:1.25rem;position:relative;box-shadow:0 6px 14px rgba(40,40,30,.18);}
  .hcard .hn{font-weight:700;font-size:1rem;margin-top:12px;line-height:1.2;}
  .hcard .hm{font-size:.78rem;color:var(--muted);margin-top:2px;}
  .hcard .next{font-size:.74rem;color:var(--teal);font-weight:600;margin-top:10px;display:flex;align-items:center;gap:5px;}
  .hcard.ext .next{color:var(--amber);}

  .ava{flex:0 0 auto;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;}

  /* LISTA: miękkie wiersze-karty */
  .row{display:flex;align-items:center;gap:14px;background:var(--card);border-radius:18px;padding:13px 15px;margin-bottom:9px;
    cursor:pointer;box-shadow:0 4px 16px rgba(60,55,40,.05);transition:transform .14s,box-shadow .14s;}
  .row:hover{transform:translateY(-2px);box-shadow:0 12px 28px rgba(60,55,40,.12);}
  .row.dup{box-shadow:0 4px 16px rgba(210,72,61,.12);}
  .row .ava{width:48px;height:48px;border-radius:15px;font-size:1.12rem;box-shadow:0 5px 12px rgba(40,40,30,.16);}
  .info{min-width:0;flex:1 1 auto;}
  .nm{font-weight:700;font-size:1.04rem;display:flex;align-items:center;gap:9px;flex-wrap:wrap;}
  .meta{font-size:.83rem;color:var(--muted);margin-top:2px;}
  .badge{font-size:.62rem;font-weight:700;text-transform:uppercase;letter-spacing:.04em;padding:3px 9px;border-radius:999px;
    color:var(--amber);background:#fcf2e1;}
  .dup-txt{color:var(--danger);font-weight:600;}
  .chev{margin-left:6px;color:var(--faint);}

  .foot{flex:0 0 auto;display:flex;gap:10px;align-items:center;padding:12px 0 18px;}
  .btn{border-radius:14px;padding:13px 18px;font-family:inherit;font-size:.9rem;font-weight:700;cursor:pointer;border:1px solid var(--line);background:#fff;color:var(--muted);}
  .btn-primary{border:0;color:#fff;background:linear-gradient(135deg,var(--teal),var(--teal2));box-shadow:0 8px 20px rgba(10,157,142,.3);margin-left:auto;}
</style>
</head>
<body>
  <div class="wrap">
    <div class="head">
      <div class="hello">Twoja praktyka</div>
      <h1>Pacjenci</h1>
      <div class="sub" id="sub"></div>
      <div class="search">
        <span class="ic"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><circle cx="11" cy="11" r="7"/><path d="m20.5 20.5-3.8-3.8"/></svg></span>
        <input id="q" type="search" placeholder="Szukaj pacjenta po nazwisku lub imieniu…">
      </div>
      <div class="filters">
        <button class="chip on" data-v="all">Wszyscy</button>
        <button class="chip" data-v="base">Z bazy</button>
        <button class="chip" data-v="ext">Spoza bazy</button>
        <button class="sort" id="sort">⇅ Ostatni</button>
      </div>
    </div>
    <div class="scroll" id="scroll"></div>
    <div class="foot">
      <button class="btn">Strona główna</button>
      <button class="btn">Importuj kopie</button>
      <button class="btn btn-primary">+ Dodaj osobę spoza bazy</button>
    </div>
  </div>

<script src="makieta_pacjenci_data.js"></script>
<script>
var state={filter:'all',q:'',sort:'recent'};
function render(keep){
  var pos=null,had=false; if(keep){var a=document.activeElement;if(a&&a.id==='q'){had=true;pos=a.selectionStart;}}
  var arr=PT.filtered(state);
  document.getElementById('sub').textContent='Łącznie '+arr.length+' — z bazy i spoza bazy w jednym miejscu.';
  var sc=document.getElementById('scroll');sc.innerHTML='';
  if(!arr.length){var e=PT.el('div','lab','Brak pasujących pacjentów.');e.style.justifyContent='center';e.style.padding='40px';sc.appendChild(e);if(keep&&had){var i0=document.getElementById('q');if(i0){i0.focus();}}return;}
  if(state.sort==='recent'&&!state.q){
    var head=PT.el('div','lab');head.appendChild(PT.el('span',null,'OSTATNIO OTWIERANI'));sc.appendChild(head);
    var hero=PT.el('div','hero');
    arr.slice().sort(function(a,b){return a.recent-b.recent;}).slice(0,5).forEach(function(p){
      var c=PT.el('div','hcard'+(p.ext?' ext':''));
      var cap=PT.el('div','cap');cap.style.cssText+=PT.avaBg(p);c.appendChild(cap);
      var av=PT.el('div','ava',PT.ini(p));av.style.cssText+=PT.avaBg(p);c.appendChild(av);
      c.appendChild(PT.el('div','hn',p.name));
      c.appendChild(PT.el('div','hm',PT.meta(p)));
      c.appendChild(PT.el('div','next',(p.ext?'◷ ':'◷ ')+p.note.replace('Ostatnia wizyta','wizyta').replace('Termin: ','')));
      sc.appendChild(hero);hero.appendChild(c);
    });
    var l2=PT.el('div','lab');l2.appendChild(PT.el('span',null,'WSZYSCY · A–Z'));l2.appendChild(PT.el('span','pill',arr.length+''));sc.appendChild(l2);
    arr.slice().sort(function(a,b){return a.name.localeCompare(b.name,'pl');}).forEach(function(p){sc.appendChild(rowOf(p));});
  } else {
    arr.forEach(function(p){sc.appendChild(rowOf(p));});
  }
  if(keep&&had){var i=document.getElementById('q');if(i){i.focus();try{i.setSelectionRange(pos,pos);}catch(e){}}}
}
function rowOf(p){
  var r=PT.el('div','row'+(PT.isDup(p)?' dup':''));
  var av=PT.el('div','ava',PT.ini(p));av.style.cssText+=PT.avaBg(p);
  var info=PT.el('div','info');
  var nm=PT.el('div','nm');nm.appendChild(PT.el('span',null,p.name));
  if(p.ext)nm.appendChild(PT.el('span','badge','spoza bazy'));
  info.appendChild(nm);
  info.appendChild(PT.el('div','meta'+(PT.isDup(p)?' dup-txt':''),PT.meta(p)));
  if(PT.isDup(p))info.appendChild(PT.el('div','meta dup-txt','to samo nazwisko — rozróżnij datą urodzenia'));
  r.appendChild(av);r.appendChild(info);r.appendChild(PT.el('span','chev','›'));
  return r;
}
document.getElementById('q').addEventListener('input',function(){state.q=this.value;render(true);});
document.querySelectorAll('.chip').forEach(function(b){b.addEventListener('click',function(){document.querySelectorAll('.chip').forEach(function(x){x.classList.remove('on');});b.classList.add('on');state.filter=b.dataset.v;render();});});
document.getElementById('sort').addEventListener('click',function(){state.sort=state.sort==='recent'?'az':state.sort==='az'?'age':'recent';this.textContent='⇅ '+({recent:'Ostatni',az:'A–Z',age:'Wiek'}[state.sort]);render();});
render();
</script>
</body>
</html>
