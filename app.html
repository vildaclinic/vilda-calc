<script>
(function(){
  try{
    var c=localStorage.getItem('vilda-pro-plan-v1');
    if(c)c=JSON.parse(c);
    var ok=c&&c.plan==='pro'&&c.validUntil&&new Date(c.validUntil).getTime()>Date.now();
    document.documentElement.classList.add(ok?'vilda-pro-active':'vilda-pro-inactive');
  }catch(_){document.documentElement.classList.add('vilda-pro-inactive');}
})();
</script>
